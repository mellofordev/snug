# Build the Snug macOS DMG on every push to the default branch and publish a GitHub Release
# with the artifact attached. Bump `version` in apps/desktop/package.json when you want
# release titles to reflect a new semver; the git tag stays unique via run number + attempt.

name: Release desktop (macOS DMG)

on:
  push:
    branches:
      - master
      - main

permissions:
  contents: write

concurrency:
  group: release-desktop-macos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dmg:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.38

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build DMG
        run: bun run dist:mac

      - name: Package metadata
        id: meta
        run: |
          VERSION=$(node -p "require('./apps/desktop/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          TAG="v${VERSION}-${{ github.run_number }}.${{ github.run_attempt }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: snug-macos-dmg-${{ steps.meta.outputs.version }}-${{ github.run_number }}
          path: apps/desktop/release/*.dmg
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Snug ${{ steps.meta.outputs.version }} (macOS, build ${{ github.run_number }})
          files: apps/desktop/release/*.dmg
          generate_release_notes: true
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
